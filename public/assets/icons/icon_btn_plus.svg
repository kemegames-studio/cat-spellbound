<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="grn" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#55dd55"/>
      <stop offset="100%" stop-color="#228822"/>
    </linearGradient>
  </defs>
  <!-- Shadow -->
  <circle cx="16" cy="17.5" r="13" fill="#00550088"/>
  <!-- Button circle -->
  <circle cx="16" cy="16" r="13" fill="url(#grn)"/>
  <!-- Rim highlight -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#88ff88" stroke-width="1.2" opacity="0.5"/>
  <!-- Top shine -->
  <ellipse cx="13" cy="10" rx="5" ry="3" fill="white" opacity="0.25" transform="rotate(-15 13 10)"/>
  <!-- Plus sign -->
  <rect x="13" y="7"  width="6" height="18" rx="3" fill="white"/>
  <rect x="7"  y="13" width="18" height="6" rx="3" fill="white"/>
</svg>
