<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44">
  <defs>
    <radialGradient id="gold" cx="38%" cy="32%" r="62%">
      <stop offset="0%"   stop-color="#ffe066"/>
      <stop offset="55%"  stop-color="#f0a800"/>
      <stop offset="100%" stop-color="#b87000"/>
    </radialGradient>
    <radialGradient id="rim" cx="50%" cy="50%" r="50%">
      <stop offset="75%"  stop-color="#c88000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#7a4800"/>
    </radialGradient>
    <filter id="gs"><feGaussianBlur stdDeviation="0.8"/></filter>
  </defs>
  <!-- Outer ring shadow -->
  <circle cx="22" cy="23" r="19" fill="#7a4800" opacity="0.35"/>
  <!-- Main coin -->
  <circle cx="22" cy="21.5" r="19" fill="url(#gold)"/>
  <!-- Edge shading -->
  <circle cx="22" cy="21.5" r="19" fill="url(#rim)"/>
  <!-- Highlight -->
  <ellipse cx="17" cy="14" rx="7" ry="4.5" fill="white" opacity="0.28" transform="rotate(-20 17 14)"/>
  <!-- Paw print -->
  <g fill="#b87000" opacity="0.85">
    <!-- Main pad -->
    <ellipse cx="22" cy="24" rx="6.5" ry="5.5"/>
    <!-- Toe pads -->
    <circle cx="15.5" cy="18.5" r="2.8"/>
    <circle cx="20"   cy="16.5" r="2.8"/>
    <circle cx="24.5" cy="16.5" r="2.8"/>
    <circle cx="29"   cy="18.5" r="2.8"/>
  </g>
  <!-- Inner highlight on pads -->
  <g fill="white" opacity="0.18">
    <ellipse cx="22" cy="23" rx="4" ry="3.5"/>
    <circle cx="15.5" cy="18" r="1.4"/>
    <circle cx="20"   cy="16" r="1.4"/>
    <circle cx="24.5" cy="16" r="1.4"/>
    <circle cx="29"   cy="18" r="1.4"/>
  </g>
</svg>
