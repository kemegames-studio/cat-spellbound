<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72">
  <defs>
    <linearGradient id="navbg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8040c0"/>
      <stop offset="100%" stop-color="#4a1a82"/>
    </linearGradient>
    <radialGradient id="face" cx="45%" cy="40%" r="58%">
      <stop offset="0%" stop-color="#e8e0d8"/>
      <stop offset="100%" stop-color="#b8aea0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="72" height="72" rx="18" fill="url(#navbg2)"/>
  <rect x="1" y="1" width="70" height="70" rx="17" fill="none" stroke="#c090f0" stroke-width="1" opacity="0.5"/>

  <!-- Cat face circle -->
  <circle cx="36" cy="41" r="22" fill="url(#face)"/>
  <!-- Face shading -->
  <circle cx="36" cy="43" r="22" fill="#9090a0" opacity="0.08"/>

  <!-- Ears -->
  <polygon points="18,24 14,8 28,20" fill="#c8c0b8"/>
  <polygon points="19,22 16,11 27,21" fill="#e8a0b0"/>
  <polygon points="54,24 58,8 44,20" fill="#c8c0b8"/>
  <polygon points="53,22 56,11 45,21" fill="#e8a0b0"/>

  <!-- Eyes -->
  <ellipse cx="28" cy="37" rx="6" ry="7" fill="#228822"/>
  <ellipse cx="44" cy="37" rx="6" ry="7" fill="#228822"/>
  <!-- Pupils -->
  <ellipse cx="28" cy="38" rx="3" ry="5.5" fill="#111"/>
  <ellipse cx="44" cy="38" rx="3" ry="5.5" fill="#111"/>
  <!-- Eye shine -->
  <circle cx="26" cy="34.5" r="1.8" fill="white" opacity="0.85"/>
  <circle cx="42" cy="34.5" r="1.8" fill="white" opacity="0.85"/>

  <!-- Nose -->
  <ellipse cx="36" cy="45.5" rx="3.5" ry="2.5" fill="#e08090"/>
  <!-- Mouth -->
  <path d="M32.5 48 Q36 52 39.5 48" fill="none" stroke="#c06070" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="36" y1="47.5" x2="36" y2="49" stroke="#c06070" stroke-width="1.2"/>

  <!-- Whiskers left -->
  <line x1="14" y1="45" x2="30" y2="46.5" stroke="#888" stroke-width="1" opacity="0.6"/>
  <line x1="14" y1="48" x2="30" y2="48"   stroke="#888" stroke-width="1" opacity="0.6"/>
  <line x1="14" y1="51" x2="30" y2="49.5" stroke="#888" stroke-width="1" opacity="0.6"/>
  <!-- Whiskers right -->
  <line x1="58" y1="45" x2="42" y2="46.5" stroke="#888" stroke-width="1" opacity="0.6"/>
  <line x1="58" y1="48" x2="42" y2="48"   stroke="#888" stroke-width="1" opacity="0.6"/>
  <line x1="58" y1="51" x2="42" y2="49.5" stroke="#888" stroke-width="1" opacity="0.6"/>

  <!-- Forehead stripe -->
  <path d="M33 22 Q36 26 39 22" fill="none" stroke="#a0988e" stroke-width="1.5" stroke-linecap="round"/>
</svg>
