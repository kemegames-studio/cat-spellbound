<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72">
  <defs>
    <linearGradient id="navbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8040c0"/>
      <stop offset="100%" stop-color="#4a1a82"/>
    </linearGradient>
    <linearGradient id="wall" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4a0ff"/>
      <stop offset="100%" stop-color="#9060cc"/>
    </linearGradient>
    <linearGradient id="roof" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6030aa"/>
      <stop offset="100%" stop-color="#3a1060"/>
    </linearGradient>
  </defs>
  <!-- Background pill -->
  <rect width="72" height="72" rx="18" fill="url(#navbg)"/>
  <rect x="1" y="1" width="70" height="70" rx="17" fill="none" stroke="#c090f0" stroke-width="1" opacity="0.5"/>

  <!-- House body -->
  <rect x="18" y="36" width="36" height="22" rx="3" fill="url(#wall)"/>
  <!-- Roof -->
  <polygon points="36,12 56,38 16,38" fill="url(#roof)"/>
  <!-- Roof ridge highlight -->
  <line x1="36" y1="13" x2="55" y2="37.5" stroke="#9060cc" stroke-width="1.2" opacity="0.6"/>
  <!-- Door -->
  <rect x="28.5" y="44" width="12" height="14" rx="6" fill="#4a1a82"/>
  <rect x="29.5" y="45" width="10" height="12.5" rx="5.5" fill="#7840b0"/>
  <!-- Door knob -->
  <circle cx="37.5" cy="51.5" r="1.4" fill="#ffd700"/>
  <!-- Window left -->
  <rect x="20" y="40" width="9" height="8" rx="2" fill="#c0e8ff" opacity="0.85"/>
  <line x1="24.5" y1="40" x2="24.5" y2="48" stroke="#9060cc" stroke-width="1"/>
  <line x1="20"   y1="44" x2="29"   y2="44" stroke="#9060cc" stroke-width="1"/>
  <!-- Window right -->
  <rect x="43" y="40" width="9" height="8" rx="2" fill="#c0e8ff" opacity="0.85"/>
  <line x1="47.5" y1="40" x2="47.5" y2="48" stroke="#9060cc" stroke-width="1"/>
  <line x1="43"   y1="44" x2="52"   y2="44" stroke="#9060cc" stroke-width="1"/>
  <!-- Chimney -->
  <rect x="44" y="20" width="6" height="10" rx="1" fill="#5a2888"/>
  <!-- Ground / garden strip -->
  <rect x="14" y="57" width="44" height="5" rx="3" fill="#3a8040" opacity="0.7"/>
  <!-- Bush left -->
  <circle cx="20" cy="57" r="5" fill="#2d7a30"/>
  <circle cx="16" cy="59" r="3.5" fill="#3a9040"/>
  <!-- Bush right -->
  <circle cx="52" cy="57" r="5" fill="#2d7a30"/>
  <circle cx="56" cy="59" r="3.5" fill="#3a9040"/>
</svg>
