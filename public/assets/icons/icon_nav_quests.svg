<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72">
  <defs>
    <linearGradient id="navbg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8040c0"/>
      <stop offset="100%" stop-color="#4a1a82"/>
    </linearGradient>
    <linearGradient id="trophy" x1="15%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%"   stop-color="#ffe066"/>
      <stop offset="40%"  stop-color="#f0a800"/>
      <stop offset="100%" stop-color="#b87000"/>
    </linearGradient>
    <linearGradient id="tsheen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="72" height="72" rx="18" fill="url(#navbg4)"/>
  <rect x="1" y="1" width="70" height="70" rx="17" fill="none" stroke="#c090f0" stroke-width="1" opacity="0.5"/>

  <!-- Trophy shadow -->
  <ellipse cx="36" cy="63" rx="14" ry="3.5" fill="#000" opacity="0.3"/>

  <!-- Trophy base platform -->
  <rect x="25" y="56" width="22" height="5" rx="2.5" fill="url(#trophy)"/>
  <!-- Stem -->
  <rect x="31.5" y="48" width="9" height="10" rx="2" fill="url(#trophy)"/>
  <!-- Stem highlight -->
  <rect x="33" y="49" width="3" height="8" rx="1.5" fill="url(#tsheen)"/>

  <!-- Cup body -->
  <path d="M18 18 Q14 30 22 42 Q29 49 36 50 Q43 49 50 42 Q58 30 54 18 Z"
        fill="url(#trophy)"/>
  <!-- Cup shine overlay -->
  <path d="M18 18 Q14 30 22 42 Q29 49 36 50 Q43 49 50 42 Q58 30 54 18 Z"
        fill="url(#tsheen)"/>
  <!-- Cup inner shadow -->
  <path d="M22 22 Q20 32 26 40 Q31 46 36 47 Q41 46 46 40 Q52 32 50 22 Z"
        fill="#c88000" opacity="0.25"/>

  <!-- Handles left -->
  <path d="M20 24 Q10 26 11 36 Q12 44 22 42" fill="none" stroke="url(#trophy)" stroke-width="5" stroke-linecap="round"/>
  <!-- Handle shine left -->
  <path d="M20 24 Q10 26 11 36 Q12 44 22 42" fill="none" stroke="white" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <!-- Handles right -->
  <path d="M52 24 Q62 26 61 36 Q60 44 50 42" fill="none" stroke="url(#trophy)" stroke-width="5" stroke-linecap="round"/>
  <path d="M52 24 Q62 26 61 36 Q60 44 50 42" fill="none" stroke="white" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>

  <!-- Star on cup -->
  <g transform="translate(36,32)">
    <polygon points="0,-9 2.6,-3.5 8.6,-2.8 4.3,1.4 5.3,7.3 0,4.5 -5.3,7.3 -4.3,1.4 -8.6,-2.8 -2.6,-3.5"
             fill="#fff7cc" stroke="#e0a000" stroke-width="0.8"/>
  </g>
</svg>
