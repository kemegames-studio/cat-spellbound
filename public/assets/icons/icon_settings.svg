<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7b3fba"/>
      <stop offset="100%" stop-color="#4a1a82"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000055"/>
    </filter>
  </defs>
  <!-- Background rounded square -->
  <rect width="52" height="52" rx="13" ry="13" fill="url(#bg)"/>
  <rect x="1" y="1" width="50" height="50" rx="12" ry="12" fill="none" stroke="#a060d0" stroke-width="1.2" opacity="0.6"/>
  <!-- Gear shape -->
  <g fill="#e0c8ff" filter="url(#shadow)" transform="translate(26,26)">
    <!-- Gear teeth (8 pegs) -->
    <rect x="-3.5" y="-14" width="7" height="6" rx="3"/>
    <rect x="-3.5" y="8"  width="7" height="6" rx="3"/>
    <rect x="-14" y="-3.5" width="6" height="7" rx="3"/>
    <rect x="8"   y="-3.5" width="6" height="7" rx="3"/>
    <rect x="-3.5" y="-14" width="7" height="6" rx="3" transform="rotate(45)"/>
    <rect x="-3.5" y="8"   width="7" height="6" rx="3" transform="rotate(45)"/>
    <rect x="-14" y="-3.5" width="6" height="7" rx="3" transform="rotate(45)"/>
    <rect x="8"   y="-3.5" width="6" height="7" rx="3" transform="rotate(45)"/>
    <!-- Gear ring -->
    <circle r="11" fill="#7b3fba" stroke="#e0c8ff" stroke-width="2.5"/>
    <!-- Centre hole -->
    <circle r="5" fill="#7b3fba"/>
    <circle r="4.2" fill="none" stroke="#e0c8ff" stroke-width="1.8"/>
  </g>
</svg>
