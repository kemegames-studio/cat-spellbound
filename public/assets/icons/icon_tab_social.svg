  <circle cx="33" cy="25" r="2.2" fill="#333"/>
  <circle cx="22" cy="24" r="0.9" fill="white" opacity="0.8"/>
  <circle cx="32" cy="24" r="0.9" fill="white" opacity="0.8"/>
  <path d="M23 31 Q28 35 33 31" fill="none" stroke="#a07060" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Heart between them -->
