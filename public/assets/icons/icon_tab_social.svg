<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72">
  <defs>
    <linearGradient id="bg_social" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8040c0"/>
      <stop offset="100%" stop-color="#4a1a82"/>
    </linearGradient>
    <radialGradient id="av1" cx="45%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#e8e0d8"/>
      <stop offset="100%" stop-color="#b8a898"/>
    </radialGradient>
    <radialGradient id="av2" cx="45%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#d0c8f8"/>
      <stop offset="100%" stop-color="#9080d0"/>
    </radialGradient>
    <linearGradient id="body2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7050b8"/>
      <stop offset="100%" stop-color="#4020808"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="72" height="72" rx="18" fill="url(#bg_social)"/>
  <rect x="1" y="1" width="70" height="70" rx="17" fill="none" stroke="#c090f0" stroke-width="1" opacity="0.5"/>

